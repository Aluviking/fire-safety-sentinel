<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SISO</title>
  <script>
    // GitHub Pages SPA redirect: encode the path as a query param and redirect to root
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?r=' + encodeURIComponent(l.pathname.slice(1).split('/').slice(1).join('/')) +
      (l.search ? '&' + l.search.slice(1) : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
